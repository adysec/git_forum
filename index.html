<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Forum</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="由 GitHub Issues 驱动的社区论坛">
  <meta property="og:title" content="Git Forum">
  <meta property="og:description" content="由 GitHub Issues 驱动的社区论坛">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="#/" class="logo">GF</a>
      <nav>
        <a href="#/">首页</a>
        <a href="#/inn/list">社区</a>
        <a href="#/search">搜索</a>
      </nav>
    </div>
  </header>
  <main id="content">
    <div class="loading">加载中...</div>
  </main>
  <!-- data-cfasync=false disables Rocket Loader for each script -->
  <script data-cfasync="false" src="config.js?v=3"></script>
  <script data-cfasync="false" src="js/api.js?v=3"></script>
  <script data-cfasync="false" src="js/components.js?v=3"></script>
  <script data-cfasync="false" src="js/router.js?v=3"></script>
  <script data-cfasync="false" src="js/app.js?v=3"></script>
  <script data-cfasync="false">
    // Inline init: runs immediately after all scripts above (non-async/non-defer)
    (function() {
      var maxWait = 20; // ~10 seconds
      function poll(n) {
        if (typeof App !== 'undefined') return App.init();
        if (n >= maxWait) {
          document.getElementById('content').innerHTML =
            '<div class="error" style="margin:40px;text-align:center">加载失败：请关闭 Cloudflare Rocket Loader 或清除缓存后重试</div>';
          return;
        }
        setTimeout(poll, 500, n + 1);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { poll(0); });
      } else {
        poll(0);
      }
    })();
  </script>
</body>
</html>
